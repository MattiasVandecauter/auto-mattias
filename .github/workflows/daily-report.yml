name: Dagelijks EV-rapport

# Draait elke dag en publiceert output/ev.html naar GitHub Pages.
on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 07:00 Brussel (zomertijd) / 06:00 (wintertijd)
  workflow_dispatch: {}     # handmatig kunnen starten via de Actions-tab

permissions:
  contents: read
  pages: write
  id-token: write

# Eén Pages-deploy tegelijk; lopende run niet afbreken.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Draai de scraper
        run: python -m autoscraper.cli

      - name: Klaarzetten voor Pages
        run: |
          mkdir -p _site
          cp output/ev.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
